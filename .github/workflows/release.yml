name: Release

# 태그(v로 시작)를 푸시하면 빌드 → 패키징 → 릴리스 발행까지 자동으로 수행한다.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: '릴리스할 태그 (예: v1.0.0)'
        required: true

permissions:
  contents: write   # 릴리스 생성에 필요

jobs:
  release:
    runs-on: windows-latest   # WinForms 빌드는 Windows 러너에서만 가능
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # 태그(v1.0.0)에서 버전(1.0.0)을 뽑아 빌드에 주입한다.
      # 덕분에 릴리스마다 csproj의 Version을 고칠 필요가 없다.
      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ inputs.tag || github.ref_name }}"
          $version = $tag -replace '^v', ''
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "tag=$tag / version=$version"

      - name: Publish single-file exe
        shell: pwsh
        run: dotnet publish EasyClipStash.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true -p:Version=${{ steps.ver.outputs.version }} -o publish

      # zip 이름에 버전을 넣지 않는다.
      # 압축을 풀면 zip 이름이 폴더 이름이 되는데, 앱이 스스로 업데이트해도 폴더 이름은 바뀌지 않아
      # 예전 버전이 적힌 폴더에 새 버전이 들어있는 상태가 되기 때문이다.
      # 버전은 릴리스 페이지와 앱(트레이 툴팁·설정 창)에서 확인한다.
      #
      # SHA256 체크섬도 함께 발행한다. 앱의 자동 업데이트가 내려받은 파일을 이 값으로 검증한다.
      - name: Package
        shell: pwsh
        run: |
          $zip = "EasyClipStash-win-x64.zip"
          Compress-Archive -Path publish/EasyClipStash.exe, LICENSE -DestinationPath $zip
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          [IO.File]::WriteAllText("$zip.sha256", $hash)
          Write-Host "$zip  $([math]::Round((Get-Item $zip).Length/1MB,1)) MB  sha256=$hash"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: EasyClipStash ${{ steps.ver.outputs.tag }}
          files: |
            EasyClipStash-win-x64.zip
            EasyClipStash-win-x64.zip.sha256
          generate_release_notes: true
